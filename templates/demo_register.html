<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{{ catalog_name }} — регистрация</title>
  <style>
    body { font-family: sans-serif; max-width: 520px; margin: 2rem auto; color: #333; }
    label { display: block; margin-top: 0.75rem; }
    input, textarea { width: 100%; padding: 0.4rem; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; background: #888; color: #fff; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>{{ catalog_name }}</h1>
  <p>Демо-каталог для агента (тестовая регистрация)</p>
  <form id="reg-form">
    <label>Email <input type="email" id="email" name="email" required></label>
    <label>Пароль <input type="password" id="password" name="password" required></label>
    <label>Компания <input type="text" id="company" name="company" required></label>
    <label>Сайт <input type="url" id="website" name="website" required></label>
    <button type="button" id="btn-register">Зарегистрироваться</button>
  </form>
  <script>
    document.getElementById('btn-register').onclick = function() {
      const q = new URLSearchParams({
        email: document.getElementById('email').value,
        company: document.getElementById('company').value,
        website: document.getElementById('website').value
      });
      window.location = '{{ verify_path }}?' + q.toString();
    };
  </script>
</body>
</html>
