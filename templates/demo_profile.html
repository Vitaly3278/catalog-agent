<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Профиль — {{ catalog_name }}</title>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 2rem auto; }
    label { display: block; margin-top: 0.6rem; }
    input, textarea { width: 100%; padding: 0.4rem; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; background: #888; color: #fff; border: none; }
    #backlink-preview { margin-top: 1rem; padding: 0.5rem; background: #eee; }
  </style>
</head>
<body>
  <h1>Карточка компании</h1>
  <label>Описание <textarea id="description" rows="4"></textarea></label>
  <label>Телефон <input type="tel" id="phone"></label>
  <label>Услуги <input type="text" id="services" placeholder="через запятую"></label>
  <p>Обратная ссылка на сайт:</p>
  <div id="backlink-preview">{{ backlink }}</div>
  <button type="button" id="btn-save-profile">Сохранить профиль</button>
  <script>
    document.getElementById('btn-save-profile').onclick = function() {
      alert('Профиль сохранён в {{ catalog_name }}');
    };
  </script>
</body>
</html>
